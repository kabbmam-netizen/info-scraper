name: Daily Info Scrape

on:
  schedule:
    # 22:00 UTC = 06:00 CST+8 next day (morning briefing)
    - cron: '0 22 * * *'
  workflow_dispatch:
    # Leave empty to run the daily subscription; enter a keyword to run a
    # full-text search instead (results archived to digests/search-*.md).
    inputs:
      search:
        description: '关键词搜索（留空 = 每日订阅）'
        required: false
        default: ''

permissions:
  contents: write  # needed to push the digest commit back to the repo

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          SEARCH_INPUT: ${{ github.event.inputs.search }}
        run: |
          if [ -n "$SEARCH_INPUT" ]; then
            python -m src.main --search "$SEARCH_INPUT"
          else
            python -m src.main
          fi

      - name: Commit digest
        run: |
          git config user.name "info-bot"
          git config user.email "info-bot@users.noreply.github.com"
          git add digests/
          if git diff --staged --quiet; then
            echo "No new digest to commit"
          else
            git commit -m "chore: daily info digest $(date -u +%Y-%m-%d)"
            git push
          fi
